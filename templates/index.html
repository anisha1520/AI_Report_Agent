<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Compliance Agent | Neon AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: white; border-radius: 20px; 
            border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .ai-output table { width: 100%; margin-top: 20px; border-collapse: separate; border-spacing: 0 8px; }
        .ai-output th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; padding: 12px; }
        .ai-output td { background: #fff; padding: 16px; border: 1px solid #f1f5f9; }
        .ai-output td:first-child { border-radius: 8px 0 0 8px; }
        .ai-output td:last-child { border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 1000px;">
    <div class="glass-card p-4 mb-4">
        <h4 class="fw-bold">Report Drafting Agent</h4>
        <p class="text-muted small">Convert operational metrics into structured regulatory reports[cite: 5].</p>
        
        <form action="/" method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="small fw-bold mb-1">Upload Source Data</label>
                    <input type="file" name="file" class="form-control" accept=".csv,.json" required>
                </div>
                <div class="col-md-5">
                    <label class="small fw-bold mb-1">Report Objective</label>
                    <input type="text" name="query" class="form-control" placeholder="e.g. Summarize performance gaps..." required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100" id="genBtn">Generate</button>
                </div>
            </div>
        </form>
    </div>

    {% if report %}
    <div class="glass-card p-4 animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h5 class="mb-0 fw-bold">Generated Compliance Report [cite: 28]</h5>
            <button class="btn btn-sm btn-outline-dark" onclick="window.print()">Export as PDF</button>
        </div>
        
        <div class="ai-output">
            {{ report | safe }}
        </div>
    </div>
    {% endif %}
</div>

<script>
    document.getElementById('uploadForm').onsubmit = function() {
        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    };
</script>

</body>
</html>
